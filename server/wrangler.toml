name = "handy-license-server"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "handy-licenses"
database_id = "YOUR_DATABASE_ID"  # 替换为你的数据库 ID

# 环境变量
[vars]
ADMIN_API_KEY = ""  # 在 Cloudflare Dashboard 或使用 wrangler secret 设置

# 生产环境
[env.production]
name = "handy-license-server-prod"
vars = { ENVIRONMENT = "production" }
